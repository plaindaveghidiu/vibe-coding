<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pomodoro Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base styles */
        body {
            background-color: #ffffff;
        }
        .timer-container {
            background-color: #0046ad;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        /* Custom Toggle Switch Styles */
        .toggle-dot {
            transition: all 0.3s ease-in-out;
        }
        input:checked ~ .toggle-dot {
            transform: translateX(100%);
        }
        /* Style adjustments for focus */
        .task-input:focus {
            border-color: #ffffff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans">

    <div class="timer-container p-10 rounded-[2rem] shadow-2xl text-center w-full max-w-md mx-4 text-white">
        <!-- Mode Indicator -->
        <h2 id="mode-text" class="text-2xl font-bold mb-4 uppercase tracking-widest text-white">Focus Time</h2>
        
        <!-- Timer Display -->
        <div id="timer-display" class="text-8xl font-black mb-4 tabular-nums text-white">
            25:00
        </div>

        <!-- Task Display Area -->
        <div class="mb-6">
            <input 
                type="text" 
                id="task-input" 
                placeholder="What are you working on?" 
                class="task-input bg-transparent border-b-2 border-white/30 py-2 px-4 w-full text-center text-xl focus:outline-none transition-all font-medium text-white"
            >
            <p id="active-task" class="mt-2 text-sm opacity-0 transition-opacity uppercase tracking-wider font-bold text-white">Current Task</p>
        </div>

        <!-- Break Type Toggle -->
        <div class="flex items-center justify-center gap-4 mb-8">
            <span class="text-xs font-bold uppercase tracking-tighter opacity-80 text-white">Short</span>
            <label for="break-toggle" class="flex items-center cursor-pointer">
                <div class="relative">
                    <input type="checkbox" id="break-toggle" class="sr-only" onchange="handleBreakToggle()">
                    <div class="block bg-white/20 w-14 h-8 rounded-full border border-white/30"></div>
                    <div class="toggle-dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full shadow-md"></div>
                </div>
            </label>
            <span class="text-xs font-bold uppercase tracking-tighter opacity-80 text-white">Long</span>
        </div>

        <!-- Controls -->
        <div class="flex gap-4 justify-center mb-8">
            <button id="start-btn" onclick="toggleTimer()" class="bg-white text-[#0046ad] px-8 py-3 rounded-full font-bold text-lg hover:bg-blue-50 transition-colors shadow-lg active:scale-95">
                START
            </button>
            <button id="reset-btn" onclick="resetTimer()" class="bg-transparent border-2 border-white/50 px-8 py-3 rounded-full font-bold text-lg hover:bg-white/10 transition-colors active:scale-95 text-white">
                RESET
            </button>
        </div>

        <!-- Quick Settings -->
        <div class="flex justify-around text-sm font-medium opacity-80 text-white">
            <button onclick="setMode('work')" class="hover:underline">Work Mode</button>
            <button onclick="switchToBreak()" class="hover:underline">Break Mode</button>
        </div>
    </div>

    <!-- Notification Sound -->
    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        // Initial State
        let timeLeft = 25 * 60; 
        let timerId = null;
        let isRunning = false;
        let currentMode = 'work';

        const display = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        const modeText = document.getElementById('mode-text');
        const alarm = document.getElementById('alarm');
        const taskInput = document.getElementById('task-input');
        const activeTaskLabel = document.getElementById('active-task');
        const breakToggle = document.getElementById('break-toggle');

        // Handle task visibility
        taskInput.addEventListener('input', (e) => {
            if (e.target.value.trim() !== "") {
                activeTaskLabel.classList.remove('opacity-0');
            } else {
                activeTaskLabel.classList.add('opacity-0');
            }
        });

        function handleBreakToggle() {
            if (currentMode !== 'work') {
                switchToBreak();
            }
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            display.textContent = timeString;
            document.title = `${timeString} - Pomodoro`;
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.textContent = 'PAUSE';
            taskInput.disabled = true;
            taskInput.classList.add('opacity-70');
            
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alarm.play();
                    isRunning = false;
                    startBtn.textContent = 'START';
                    taskInput.disabled = false;
                    taskInput.classList.remove('opacity-70');
                    autoSwitchMode();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = 'START';
            taskInput.disabled = false;
            taskInput.classList.remove('opacity-70');
            clearInterval(timerId);
        }

        function resetTimer() {
            pauseTimer();
            if (currentMode === 'work') {
                setMode('work');
            } else {
                switchToBreak();
            }
        }

        function setMode(mode) {
            currentMode = mode;
            pauseTimer();
            
            if (mode === 'work') {
                timeLeft = 25 * 60;
                modeText.textContent = "Focus Time";
            } else if (mode === 'short') {
                timeLeft = 5 * 60;
                modeText.textContent = "Short Break";
            } else if (mode === 'long') {
                timeLeft = 15 * 60;
                modeText.textContent = "Long Break";
            }
            updateDisplay();
        }

        function switchToBreak() {
            const isLongBreak = breakToggle.checked;
            setMode(isLongBreak ? 'long' : 'short');
        }

        function autoSwitchMode() {
            modeText.textContent = "Finished!";
            setTimeout(() => {
                if (currentMode === 'work') {
                    switchToBreak();
                } else {
                    setMode('work');
                }
            }, 3000);
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
